<!DOCTYPE html>
<html lang="en">
  <head>
<meta name="aif-mvp-id" content="e9a28bf1-f5ca-4db8-8703-7025cd54d660" />
<meta name="aif-api" content="https://www.aifounders.live/api/analytics" />
<script async src="https://www.aifounders.live/aif.js"></script>
<meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommitCasualty — Open-Source Reliability Score</title>
    <meta name="description" content="Score any GitHub repo's reliability in seconds. Enter five signals — commits, issues, contributors, freshness — and get an instant deterministic score." />
    <meta property="og:title" content="CommitCasualty — Open-Source Reliability Score" />
    <meta property="og:description" content="Score any GitHub repo's reliability in seconds. Enter five signals — commits, issues, contributors, freshness — and get an instant deterministic score." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
    <style>
      /* Pre-hydration skeleton — visible before JS loads */
      .app-skeleton{max-width:42rem;margin:0 auto;padding:3rem 1rem;text-align:center;font-family:system-ui,-apple-system,sans-serif}
      .app-skeleton h1{font-size:1.875rem;font-weight:700;color:#111827;margin-bottom:.5rem}
      .app-skeleton p{color:#6b7280;font-size:1rem;margin-bottom:1.5rem}
      .skeleton-inputs{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;max-width:28rem;margin:0 auto 1rem}
      .skeleton-input-group{text-align:left}
      .skeleton-input-group label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.25rem}
      .skeleton-input{width:100%;box-sizing:border-box;padding:.5rem .75rem;border-radius:.5rem;border:1px solid #d1d5db;background:#fff;font-size:.875rem;color:#111827;outline:none;font-family:inherit}
      .skeleton-input:focus{border-color:transparent;box-shadow:0 0 0 2px #EF4444}
      .skeleton-input::placeholder{color:#9ca3af}
      .skeleton-hint{font-size:.65rem;color:#9ca3af;margin-top:.2rem}
      .skeleton-full{grid-column:1/-1;max-width:calc(50% - .375rem)}
    </style>
  </head>
  <body class="bg-white text-gray-900">
    <div id="root">
      <header style="border-bottom:1px solid #f3f4f6;padding:.75rem 1rem">
        <div style="max-width:56rem;margin:0 auto;display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:700;font-size:1.125rem;color:#111827">CommitCasualty</span>
        </div>
      </header>
      <div class="app-skeleton">
        <h1>How reliable is that repo? Score it in seconds.</h1>
        <p>Enter five signals from any GitHub repo to get an instant reliability score.</p>
        <div class="skeleton-inputs">
          <div class="skeleton-input-group">
            <label>Commits (last 90 days)</label>
            <input type="number" class="skeleton-input" placeholder="e.g. 45" />
          </div>
          <div class="skeleton-input-group">
            <label>Days since last commit</label>
            <input type="number" class="skeleton-input" placeholder="e.g. 3" />
          </div>
          <div class="skeleton-input-group">
            <label>Open issues</label>
            <input type="number" class="skeleton-input" placeholder="e.g. 12" />
          </div>
          <div class="skeleton-input-group">
            <label>Closed issues</label>
            <input type="number" class="skeleton-input" placeholder="e.g. 50" />
          </div>
          <div class="skeleton-input-group skeleton-full">
            <label>Contributors</label>
            <input type="number" class="skeleton-input" placeholder="e.g. 8" />
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
